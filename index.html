<!DOCTYPEdoctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Notas</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }
        body{
            background:#f2f2f2;
        }
        .container{
            width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }
        h1{
            text-align:center;
            margin-bottom:20px;
            color:#004080;
        }
        .formulario{
            display:grid;
            grid-template-columns:2fr repeat(4,1fr) auto;
            gap:10px;
            margin-bottom:25px;
        }
        input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{
            background:#0056b3;
        }
        table{
            width:100%;
            border-collapse:collapse;
        }
        th{
            background:#004080;
            color:white;
            padding:12px;
        }
        td{
            text-align:center;
            padding:10px;
            border-bottom:1px solid #ddd;
        }
        .aprovado{
            color:green;
            font-weight:bold;
        }
        .reprovado{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Controle de Notas dos Alunos</h1>

        <div class="formulario">
            <input type="text" id="nome" placeholder="Nome do aluno">
            <input type="number" id="n1" placeholder="Nota 1">
            <input type="number" id="n2" placeholder="Nota 2">
            <input type="number" id="n3" placeholder="Nota 3">
            <button onclick="adicionar()">Adicionar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                    <th>Nota 3</th>
                    <th>Media</th>
                    <th>Situacao</th>
                </tr>
            </thead>
            <tbody id="tabela">
            </tbody>
        </table>
    </div>

    <script>
        function adicionar(){
            let nome=document.getElementById("nome").value;
            let n1=parseFloat(document.getElementById("n1").value);
            let n2=parseFloat(document.getElementById("n2").value);
            let n3=parseFloat(document.getElementById("n3").value);

            if(nome=="" || isNaN(n1) || isNaN(n2) || isNaN(n3) ||
              ){
                alert("Preencha todos os campos.");
                return;
            }

            let media=((n1+n2+n3)/4).toFixed(1);
            let situacao="";
            let classe="";

            if(media>=7){
                situacao="Aprovado";
                classe="aprovado";
            }else{
                situacao="Reprovado";
                classe="reprovado";
            }

            let linha=`
            <tr>
                <td>${nome}</td>
                <td>${n1}</td>
                <td>${n2}</td>
                <td>${n3}</td>
                <td>${media}</td>
                <td class="${classe}">${situacao}</td>
            </tr>`;

            document.getElementById("tabela").innerHTML += linha;

            document.getElementById("nome").value="";
            document.getElementById("n1").value="";
            document.getElementById("n2").value="";
            document.getElementById("n3").value="";
        }
    </script>
</body>
</html>
